<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie – MyMovieList</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@300;400;600;700&family=Overpass+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">
      <span class="logo-icon">M</span>
      <span class="logo-text">MyMovieList</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="watchlist.html">My List</a>
      <a href="about-project.html">About</a>
      <a href="developers.html">Developers</a>
    </div>
    <div class="nav-right">
      <button class="icon-btn" id="searchToggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <div class="avatar-wrap">
        <img src="https://api.dicebear.com/7.x/thumbs/svg?seed=movie" alt="avatar" class="avatar"/>
      </div>
    </div>
  </nav>

  <div class="search-overlay" id="searchOverlay">
    <input type="text" id="searchInput" placeholder="Search movies…" autocomplete="off"/>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- BANNER -->
  <div class="movie-banner" id="movieBanner">
    <div class="movie-banner-skeleton" id="bannerSkeleton"></div>
  </div>

  <!-- IDENTITY -->
  <div class="movie-identity">
    <div class="movie-poster-skeleton" id="posterSkeleton"></div>
    <img class="movie-poster-big" id="moviePosterBig" src="" alt="" style="display:none"/>
    <div class="movie-title-block" id="titleBlock" style="visibility:hidden">
      <h1 id="movieTitleH1">–</h1>
      <div class="movie-title-meta">
        <span class="movie-tmdb-score" id="movieTmdbScore"></span>
        <span class="movie-year-tag"  id="movieYearTag"></span>
        <span class="movie-runtime"   id="movieRuntime"></span>
        <span class="movie-genre-tag" id="movieGenreTag" style="display:none"></span>
      </div>
      <div class="list-entry-btn" id="listEntryBtn">
        <button class="list-status-btn not-listed" id="listStatusBtn">+ Add to List</button>
        <button class="list-dropdown-btn not-listed" id="listDropdownBtn">▾</button>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="movie-tabs">
    <div class="mtab active" data-tab="overview">Overview</div>
  </div>

  <!-- BODY -->
  <div class="movie-body">
    <div class="movie-left" id="movieLeft">
      <!-- Overview tab -->
      <div id="tabOverview">
        <div class="movie-card-block">
          <h2>Description</h2>
          <p class="movie-overview" id="movieOverviewText">Loading…</p>
        </div>
        <div class="movie-card-block" id="trailerBlock" style="display:none">
          <h2>Trailer</h2>
          <div id="trailerEmbed" style="position:relative;padding-bottom:56.25%;height:0;border-radius:4px;overflow:hidden">
            <iframe id="trailerIframe" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none" allowfullscreen></iframe>
          </div>
        </div>
      </div>
    </div>

    <div class="movie-right" id="movieRight">
      <!-- My List Entry -->
      <div class="my-entry-card" id="myEntryCard" style="display:none">
        <div class="my-entry-header">My List Entry</div>
        <div class="my-entry-body">
          <div class="my-entry-row">
            <span>Status</span>
            <span id="myEntryStatus" style="font-weight:600"></span>
          </div>
          <div class="my-entry-row">
            <span>My Score</span>
            <span id="myEntryScore" style="font-family:var(--mono);color:var(--score-color);font-weight:700"></span>
          </div>
          <button class="my-entry-edit-btn" id="myEntryEditBtn">Edit Entry</button>
        </div>
      </div>

      <!-- Score card -->
      <div class="movie-card-block">
        <h2>Score</h2>
        <div class="score-ring-wrap" id="scoreRingWrap">
          <div>
            <div class="score-ring">
              <svg width="80" height="80" viewBox="0 0 80 80">
                <circle cx="40" cy="40" r="34" fill="none" stroke="var(--bg-elevated)" stroke-width="6"/>
                <circle id="scoreArc" cx="40" cy="40" r="34" fill="none" stroke="var(--score-color)" stroke-width="6"
                        stroke-linecap="round" stroke-dasharray="0 214" style="transition:stroke-dasharray 0.8s ease"/>
              </svg>
              <div class="score-ring-num" id="scoreRingNum">–</div>
            </div>
            <div class="score-ring-label">TMDB Score</div>
          </div>
        </div>
      </div>

      <!-- Movie info -->
      <div class="movie-card-block" id="movieInfoCard">
        <h2>Information</h2>
        <div id="movieInfoRows">
          <div class="movie-info-row"><span>Status</span><span id="infoStatus">–</span></div>
          <div class="movie-info-row"><span>Runtime</span><span id="infoRuntime">–</span></div>
          <div class="movie-info-row"><span>Released</span><span id="infoReleased">–</span></div>
          <div class="movie-info-row"><span>Language</span><span id="infoLanguage">–</span></div>
          <div class="movie-info-row"><span>Budget</span><span id="infoBudget">–</span></div>
          <div class="movie-info-row"><span>Revenue</span><span id="infoRevenue">–</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD / EDIT MODAL -->
  <div class="list-modal-overlay" id="listModalOverlay">
    <div class="list-modal">
      <div class="list-modal-header">
        <img class="list-modal-poster" id="lmPoster" src="" alt=""/>
        <div>
          <div class="list-modal-title" id="lmTitle"></div>
          <div class="list-modal-year"  id="lmYear"></div>
        </div>
        <button class="list-modal-close" id="lmClose">×</button>
      </div>
      <div class="list-modal-body">
        <div class="lm-row">
          <label>Status</label>
          <div class="status-pills" id="statusPills">
            <button class="status-pill" data-val="watching">Watching</button>
            <button class="status-pill" data-val="completed">Completed</button>
            <button class="status-pill" data-val="planning">Planning</button>
          </div>
        </div>
        <div class="lm-row">
          <label>My Score (0–10)</label>
          <div class="score-slider-wrap">
            <input type="range" id="lmScore" min="0" max="10" step="0.5" value="0"/>
            <span id="lmScoreDisplay">–</span>
          </div>
        </div>
        <div class="lm-row">
          <label>Notes (optional)</label>
          <textarea id="lmNotes" rows="3" placeholder="Your thoughts…"></textarea>
        </div>
      </div>
      <div class="list-modal-actions">
        <button class="btn-remove-list" id="lmRemove" style="display:none">Remove from List</button>
        <div style="display:flex;gap:0.75rem;margin-left:auto">
          <button class="btn-cancel" id="lmCancel">Cancel</button>
          <button class="btn-primary" id="lmSave">Save to List</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Data provided by <a href="https://www.themoviedb.org" target="_blank">The Movie Database (TMDB)</a></p>
    <nav>
      <a href="index.html">Home</a>
      <a href="watchlist.html">My List</a>
      <a href="about-project.html">About</a>
      <a href="developers.html">Developers</a>
    </nav>
  </footer>

  <script src="app.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', async () => {
    const TMDB_KEY = 'acfb9ea58a3e65219d08463fa400b16c';
    const params  = new URLSearchParams(window.location.search);
    const movieId = params.get('id');

    if (!movieId) { window.location.href = 'index.html'; return; }

    // Storage
    function getList() {
      try { return JSON.parse(localStorage.getItem('mml_watchlist') || '[]'); } catch { return []; }
    }
    function saveList(list) { localStorage.setItem('mml_watchlist', JSON.stringify(list)); }
    function showToast(msg) {
      const ex = document.querySelector('.toast'); if (ex) ex.remove();
      const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
    function formatMoney(n) {
      if (!n || n === 0) return 'N/A';
      if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
      if (n >= 1e6) return '$' + (n/1e6).toFixed(0) + 'M';
      return '$' + n.toLocaleString();
    }
    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

    // ---- Fetch movie details ----
    let movie = null;
    try {
      const res = await fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${TMDB_KEY}&language=en-US&append_to_response=videos`);
      movie = await res.json();
    } catch {
      document.getElementById('movieOverviewText').textContent = 'Could not load movie data.';
      return;
    }

    // ---- Populate page ----
    document.title = `${movie.title} – MyMovieList`;

    // Banner (backdrop)
    const bannerEl = document.getElementById('movieBanner');
    document.getElementById('bannerSkeleton').remove();
    if (movie.backdrop_path) {
      const bImg = document.createElement('img');
      bImg.className = 'movie-banner-img';
      bImg.src = `https://image.tmdb.org/t/p/w1280${movie.backdrop_path}`;
      const grad = document.createElement('div');
      grad.className = 'movie-banner-gradient';
      bannerEl.appendChild(bImg);
      bannerEl.appendChild(grad);
    } else {
      bannerEl.style.background = 'var(--bg-elevated)';
    }

    // Poster
    const posterSkeleton = document.getElementById('posterSkeleton');
    const posterBig      = document.getElementById('moviePosterBig');
    if (movie.poster_path) {
      posterBig.src = `https://image.tmdb.org/t/p/w342${movie.poster_path}`;
      posterBig.alt = movie.title;
      posterBig.onload = () => { posterSkeleton.remove(); posterBig.style.display = 'block'; };
    } else {
      posterSkeleton.remove();
      posterBig.src = 'https://via.placeholder.com/160x240/151b26/6e7c8e?text=No+Poster';
      posterBig.style.display = 'block';
    }

    // Title block
    document.getElementById('titleBlock').style.visibility = 'visible';
    document.getElementById('movieTitleH1').textContent = movie.title;

    const score = movie.vote_average ? movie.vote_average.toFixed(1) : null;
    if (score) document.getElementById('movieTmdbScore').textContent = `★ ${score}`;
    if (movie.release_date) document.getElementById('movieYearTag').textContent = movie.release_date.slice(0,4);
    if (movie.runtime) document.getElementById('movieRuntime').textContent = `${movie.runtime} min`;

    const genres = (movie.genres || []).slice(0, 2).map(g => g.name).join(' / ');
    if (genres) {
      const gt = document.getElementById('movieGenreTag');
      gt.textContent = genres; gt.style.display = 'inline-block';
    }

    // Overview
    document.getElementById('movieOverviewText').textContent = movie.overview || 'No description available.';

    // Score ring
    if (score) {
      const pct = parseFloat(score) / 10;
      const circ = 2 * Math.PI * 34;
      document.getElementById('scoreArc').setAttribute('stroke-dasharray', `${pct * circ} ${circ}`);
      document.getElementById('scoreRingNum').textContent = score;
    }

    // Info rows
    document.getElementById('infoStatus').textContent   = movie.status || '–';
    document.getElementById('infoRuntime').textContent  = movie.runtime ? `${movie.runtime} min` : '–';
    document.getElementById('infoReleased').textContent = movie.release_date || '–';
    document.getElementById('infoLanguage').textContent = (movie.original_language || '').toUpperCase() || '–';
    document.getElementById('infoBudget').textContent   = formatMoney(movie.budget);
    document.getElementById('infoRevenue').textContent  = formatMoney(movie.revenue);

    // Trailer
    const videos = movie.videos?.results || [];
    const trailer = videos.find(v => v.type === 'Trailer' && v.site === 'YouTube') || videos[0];
    if (trailer) {
      document.getElementById('trailerBlock').style.display = 'block';
      document.getElementById('trailerIframe').src = `https://www.youtube.com/embed/${trailer.key}`;
    }

    // Watchlist entry
    function getMyEntry() {
      return getList().find(m => String(m.tmdb_id) === String(movieId));
    }
    function refreshEntryUI() {
      const entry = getMyEntry();
      const statusBtn   = document.getElementById('listStatusBtn');
      const dropBtn     = document.getElementById('listDropdownBtn');
      const myCard      = document.getElementById('myEntryCard');
      const myStatus    = document.getElementById('myEntryStatus');
      const myScore     = document.getElementById('myEntryScore');
      const lmRemoveBtn = document.getElementById('lmRemove');

      if (entry) {
        statusBtn.textContent = capitalize(entry.status);
        statusBtn.className   = 'list-status-btn';
        dropBtn.className     = 'list-dropdown-btn';
        myCard.style.display  = 'block';
        myStatus.textContent  = capitalize(entry.status);
        myScore.textContent   = entry.score > 0 ? entry.score : '–';
        if (lmRemoveBtn) lmRemoveBtn.style.display = 'inline-block';
      } else {
        statusBtn.textContent = '+ Add to List';
        statusBtn.className   = 'list-status-btn not-listed';
        dropBtn.className     = 'list-dropdown-btn not-listed';
        myCard.style.display  = 'none';
        if (lmRemoveBtn) lmRemoveBtn.style.display = 'none';
      }
    }
    refreshEntryUI();

    // Modal state
    let selectedStatus = 'planning';

    function openListModal() {
      const entry = getMyEntry();
      selectedStatus = entry ? entry.status : 'planning';

      // Pre-fill
      document.getElementById('lmPoster').src  = movie.poster_path ? `https://image.tmdb.org/t/p/w92${movie.poster_path}` : '';
      document.getElementById('lmTitle').textContent = movie.title;
      document.getElementById('lmYear').textContent  = movie.release_date?.slice(0,4) || '';
      document.getElementById('lmScore').value        = entry ? (entry.score || 0) : 0;
      document.getElementById('lmScoreDisplay').textContent = (entry && entry.score > 0) ? entry.score : '–';
      document.getElementById('lmNotes').value        = entry ? (entry.notes || '') : '';

      // Status pills
      document.querySelectorAll('.status-pill').forEach(p => {
        p.className = 'status-pill';
        if (p.dataset.val === selectedStatus) p.className = `status-pill active-${selectedStatus}`;
      });

      document.getElementById('listModalOverlay').classList.add('open');
    }

    function closeListModal() {
      document.getElementById('listModalOverlay').classList.remove('open');
    }

    // Status pill clicks
    document.querySelectorAll('.status-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        selectedStatus = pill.dataset.val;
        document.querySelectorAll('.status-pill').forEach(p => p.className = 'status-pill');
        pill.className = `status-pill active-${selectedStatus}`;
      });
    });

    // Score slider
    document.getElementById('lmScore').addEventListener('input', function() {
      const v = parseFloat(this.value);
      document.getElementById('lmScoreDisplay').textContent = v === 0 ? '–' : v;
    });

    // Save
    document.getElementById('lmSave').addEventListener('click', () => {
      const list  = getList();
      const score = parseFloat(document.getElementById('lmScore').value) || 0;
      const notes = document.getElementById('lmNotes').value;
      const idx   = list.findIndex(m => String(m.tmdb_id) === String(movieId));

      if (idx !== -1) {
        list[idx] = { ...list[idx], status: selectedStatus, score, notes };
        showToast('Entry updated!');
      } else {
        list.push({
          id:          Date.now().toString(),
          tmdb_id:     String(movieId),
          title:       movie.title,
          year:        movie.release_date?.slice(0,4) || '',
          score,
          status:      selectedStatus,
          genre:       (movie.genres || [])[0]?.name || '',
          notes,
          tmdb_poster: movie.poster_path || '',
          overview:    movie.overview || '',
          dateAdded:   new Date().toISOString()
        });
        showToast(`"${movie.title}" added as ${capitalize(selectedStatus)}!`);
      }
      saveList(list);
      closeListModal();
      refreshEntryUI();
    });

    // Remove
    document.getElementById('lmRemove').addEventListener('click', () => {
      if (!confirm('Remove from your list?')) return;
      const list = getList().filter(m => String(m.tmdb_id) !== String(movieId));
      saveList(list);
      showToast('Removed from list.');
      closeListModal();
      refreshEntryUI();
    });

    // Open modal buttons
    document.getElementById('listStatusBtn').addEventListener('click',   openListModal);
    document.getElementById('listDropdownBtn').addEventListener('click', openListModal);
    document.getElementById('myEntryEditBtn')?.addEventListener('click', openListModal);

    // Close modal
    document.getElementById('lmClose').addEventListener('click',  closeListModal);
    document.getElementById('lmCancel').addEventListener('click', closeListModal);
    document.getElementById('listModalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('listModalOverlay')) closeListModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeListModal(); });
  });
  </script>
</body>
</html>
